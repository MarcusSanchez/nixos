# Push-to-main is the deploy for the WSL box (system.autoUpgrade builds
# pushed main weekly), so catch a broken commit here — days before the
# Saturday timer meets it. Mirrors the local verification story:
# `nix flake check` fully evaluates the WSL system, then the mac system
# is evaluated the same way either machine evals the other's platform.
name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: nix flake check
        run: nix flake check
      - name: evaluate the mac system
        run: nix eval --raw '.#darwinConfigurations."Marcuss-MacBook-Air".system.drvPath'
